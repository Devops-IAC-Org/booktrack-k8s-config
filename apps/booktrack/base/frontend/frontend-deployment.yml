apiVersion: apps/v1
kind: Deployment
metadata:
  name: booktrack-frontend
  namespace: booktrack
  labels:
    app.kubernetes.io/name: booktrack
    app.kubernetes.io/component: frontend
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: booktrack
      app.kubernetes.io/component: frontend
  template:
    metadata:
      name: booktrack-frontend
      labels:
        app.kubernetes.io/name: booktrack
        app.kubernetes.io/component: frontend
    spec:
      containers:
      - name: booktrack-frontend-nginx
        image: mniranjanr7/booktrack-frontend:10.0
        ports:
        - name: http
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /
            port: 8080
