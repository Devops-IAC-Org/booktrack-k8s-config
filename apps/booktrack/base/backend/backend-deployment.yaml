apiVersion: apps/v1
kind: Deployment
metadata:
  name: booktrack-backendapp
  namespace: booktrack
  labels:
    app.kubernetes.io/name: booktrack
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booktrack-backendapp
  template:
    metadata:
      name: booktrack-backendapp
      labels:
        app: booktrack-backendapp
    spec:
      serviceAccount: backend-sa
      containers:
      - name: booktrack-backendapp
        image: mniranjanr7/booktrack-backend:7ba4bf7297657027529ffe2c2f6fe95c5b4c397b
        envFrom:
        - configMapRef:
            name: postgre-config
        - secretRef:
            name: postgre-login
        ports:
        - name: http-port
          containerPort: 8000
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "250Mi"
