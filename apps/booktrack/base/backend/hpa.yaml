apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: booktrack-backend-hpa
  namespace: booktrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: booktrack-backendapp-blue
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
