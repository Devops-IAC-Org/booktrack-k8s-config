apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: booktrack-backend
  namespace: booktrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      app.kubernetes.io/name: booktrack
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend
        app.kubernetes.io/name: booktrack
    spec:
      containers:
      - name: booktrack-backend
        image: mniranjanr7/booktrack-backend:c224df0833d9fe6ef7cb98e21fe48b6540be6f37
        envFrom:
        - configMapRef:
            name: postgre-config
        - secretRef:
            name: postgre-login
        ports:
        - containerPort: 8000
        startupProbe:
          httpGet:
            path: /startup
            port: 8000
          failureThreshold: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "250Mi"
  strategy:
    blueGreen:
      activeService: svc-booktrack-backend
      previewService: svc-booktrack-backend-preview
      autoPromotionEnabled: true
      scaleDownDelaySeconds: 30
