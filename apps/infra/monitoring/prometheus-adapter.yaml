apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-adapter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels: app.kubernetes.io/name=prometheus-adapter
  template:
    metadata:
      labels: app.kubernetes.io/name=prometheus-adapter
    spec:
      containers:
      - name: prometheus-adapter
        image: registry.k8s.io/prometheus-adapter/prometheus-adapter:v0.10.0
        args:
        - --prometheus-url=http://prometheus-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090
        - --metrics-relist-interval=30s
        - --v=4
        volumeMounts:
        - name: config
          mountPath: /etc/adapter/
        ports:
        - containerPort: 6443
      volumes:
      - name: config
        configMap:
          name: prometheus-adapter-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-adapter-config
  namespace: monitoring
data:
  config.yaml: |
    rules:
      custom:
      - seriesQuery: 'http_requests_total{namespace!=""}'
        resources:
          overrides:
            namespace:
              resource: namespace
            pod:
              resource: pod
        name:
          matches: "^(.*)_total"
          as: "${1}"
        metricsQuery: |
          sum(rate(http_requests_total{<<.LabelMatchers>>}[1m])) by (<<.GroupBy>>)
