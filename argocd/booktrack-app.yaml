apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: booktrack
  namespace: argocd
spec:
  project: booktrack
  source:
    repoURL: https://github.com/mniranjanr7/booktrack-k8s-config.git
    targetRevision: main
    path: apps/booktrack/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: booktrack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
